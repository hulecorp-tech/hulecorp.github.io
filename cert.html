:root{

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Sans SC',-apple-system,sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
a{color:inherit;text-decoration:none}

.wrap{max-width:1240px;margin:0 auto;padding:0 24px}
.grad{background:linear-gradient(90deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}

/* TOP BAR */
.top{position:sticky;top:0;z-index:50;background:rgba(244,235,220,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd)}
.top-in{display:flex;align-items:center;justify-content:space-between;height:62px;gap:12px}
.brand{display:flex;align-items:center;gap:10px;font-family:'Poppins';font-weight:800}

.top-r{display:flex;align-items:center;gap:10px}
.btn{padding:10px 20px;border-radius:26px;font-weight:700;font-size:.84rem;border:none;transition:.18s;font-family:'Poppins'}
.btn-o{background:var(--orange);color:#fff;box-shadow:0 6px 18px rgba(255,122,26,.32)}
.btn-o:hover{background:var(--orange2)}
.btn-nv{background:var(--ink);color:var(--cream)}
.btn-g{background:var(--cream2);color:var(--ink)}

.btn-sm{padding:6px 14px;font-size:.78rem;border-radius:20px}

.bdg{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase}
.bdg-a{background:var(--orange);color:#fff}.bdg-m{background:var(--navy3);color:#fff}

/* LAYOUT */
.hd{padding:30px 0 10px}
.hd h1{font-family:'Poppins';font-size:1.7rem;font-weight:900;letter-spacing:-.5px}
.hd p{color:var(--ink2);margin-top:6px;font-size:.92rem}
.grid{display:grid;grid-template-columns:380px 1fr;gap:24px;padding:20px 0 60px;align-items:start}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:22px;box-shadow:0 6px 24px rgba(0,0,0,.06)}
.panel h3{font-family:'Poppins';font-size:1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:15px}
.field label{display:block;font-size:.8rem;font-weight:700;margin-bottom:6px;color:var(--ink)}
.field input,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:11px;font-family:inherit;font-size:.9rem;background:#fff;color:var(--ink);outline:none;transition:.15s}
.field input:focus,.field textarea:focus{border-color:var(--orange)}

/* DROP ZONE */
.drop{border:2px dashed var(--bd);border-radius:14px;padding:22px;text-align:center;transition:.2s;cursor:pointer;background:#fff}
.drop.over{border-color:var(--orange);background:rgba(255,122,26,.05)}
.drop .emo{font-size:1.8rem}
.drop .t{font-weight:700;font-size:.85rem;margin-top:6px}
.drop .s{color:var(--ink2);font-size:.76rem;margin-top:3px}
.drop img{max-height:90px;border-radius:10px;margin-top:8px}

/* PREVIEW */
.preview-wrap{position:sticky;top:80px}
.canvas-box{background:#fff;border:1px solid var(--bd);border-radius:var(--radius);padding:18px;box-shadow:0 6px 24px rgba(0,0,0,.06);text-align:center}
#preview{max-width:100%;max-height:74vh;border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}

/* ADVANCED */
details.adv{margin-top:8px;border-top:1px solid var(--bd);padding-top:14px}
details.adv summary{cursor:pointer;font-weight:700;font-size:.82rem;color:var(--orange)}
.slider{margin:10px 0}
.slider label{display:flex;justify-content:space-between;font-size:.74rem;color:var(--ink2);margin-bottom:3px}
.slider input{width:100%}

/* BATCH */

.batch-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.batch-tbl th{text-align:left;padding:8px;color:var(--ink2);font-weight:700;border-bottom:2px solid var(--bd);font-size:.74rem;text-transform:uppercase}
.batch-tbl td{padding:6px 8px;border-bottom:1px solid var(--bd);vertical-align:top}
.batch-tbl input{width:100%;padding:7px 9px;border:1.5px solid var(--bd);border-radius:8px;font-family:inherit;font-size:.8rem}
.batch-tbl .photo-cell{width:90px}
.bphoto{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--bd);cursor:pointer;background:var(--cream2)}
.bphoto-empty{width:64px;height:64px;border-radius:50%;border:2px dashed var(--bd);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--ink2);cursor:pointer;background:#fff}
.row-del{color:#ef4444;background:none;border:none;font-size:1.1rem;cursor:pointer}

/* GATE */
.gate{min-height:80vh;display:flex;align-items:center;justify-content:center}
.gate-box{text-align:center;max-width:420px;padding:40px}
.gate-box .emo{font-size:3rem;margin-bottom:14px}
.gate-box h2{font-family:'Poppins';margin-bottom:10px}

.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--cream);padding:12px 20px;border-radius:12px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}.toast.err{background:#ef4444;color:#fff}
.spin{text-align:center;padding:80px 20px;color:var(--ink2)}
.spin::before{content:'⟳';display:block;font-size:2.4rem;margin-bottom:12px;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

@media(max-width:880px){
  .grid{grid-template-columns:1fr}
  .preview-wrap{position:static}

/* ---------- canvas drawing ---------- */
function gradText(ctx,text,cx,y,size,family,weight,solid){
  ctx.font=`${weight} ${size}px ${family}`;
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  const w=ctx.measureText(text).width;
  if(solid){ctx.fillStyle=solid;}
  else{const g=ctx.createLinearGradient(cx-w/2,y,cx+w/2,y);g.addColorStop(0,'#294998');g.addColorStop(1,'#dd2f8c');ctx.fillStyle=g;}
  ctx.fillText(text,cx,y);
}
function wrap(ctx,text,maxW,size,family,weight){
  ctx.font=`${weight} ${size}px ${family}`;
  const words=String(text).split(/\s+/);const lines=[];let cur='';
  for(const w of words){const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w}else cur=t}
  if(cur)lines.push(cur);return lines;
}
// draw a line made of segments with different fonts, centered, single continuous gradient
function gradSegments(ctx,segs,cx,y,size,solid){
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  let total=0;for(const s of segs){ctx.font=`${s.weight} ${size}px ${s.family}`;total+=ctx.measureText(s.text).width}
  let x=cx-total/2;const startX=x;
  let fill;
  if(solid)fill=solid;
  else{const g=ctx.createLinearGradient(startX,y,startX+total,y);g.addColorStop(0,'#294998');g.addColorStop(1,'#dd2f8c');fill=g}
  for(const s of segs){
    ctx.font=`${s.weight} ${size}px ${s.family}`;ctx.fillStyle=fill;
    ctx.fillText(s.text,x,y);x+=ctx.measureText(s.text).width;
  }
  ctx.textAlign='center';
}
function drawCircle(ctx,img,cx,cy,r){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.closePath();ctx.clip();
  const ar=img.width/img.height;const d=r*2;let dw,dh;
  if(ar>1){dh=d;dw=d*ar}else{dw=d;dh=d/ar}
  ctx.drawImage(img,cx-dw/2,cy-dh/2,dw,dh);ctx.restore();
}
function drawCert(ctx,W,H,data){
  ctx.clearRect(0,0,W,H);
  if(tplImg)ctx.drawImage(tplImg,0,0,W,H);
  else{ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.strokeStyle='#E2D8CC';ctx.lineWidth=4;ctx.strokeRect(20,20,W-40,H-40);}
  // photo
  if(data.photo)drawCircle(ctx,data.photo,W*POS.photoX,H*POS.photoY,W*POS.photoR);
  // name — MTD Brand Pro
  if(data.name)gradText(ctx,data.name,W*POS.photoX,H*POS.nameY,W*POS.nameSize,'"MTD Brand Pro"','400');
  // divider
  if(data.name){ctx.strokeStyle='#c9b9a4';ctx.lineWidth=Math.max(1,W*0.0012);ctx.beginPath();ctx.moveTo(W*(POS.photoX-POS.lineW/2),H*POS.lineY);ctx.lineTo(W*(POS.photoX+POS.lineW/2),H*POS.lineY);ctx.stroke();}
  // content — RubikMKT Bold (respect manual line breaks, then auto-wrap each)
  if(data.content){
    let lines=[];
    String(data.content).split(/\r?\n/).forEach(seg=>{
      if(seg.trim()==='')lines.push('');
      else lines=lines.concat(wrap(ctx,seg,W*0.80,W*POS.contentSize,'RubikMKT','700'));
    });
    lines.forEach((ln,i)=>{if(ln)gradText(ctx,ln,W*POS.photoX,H*POS.contentY+i*H*POS.contentGap,W*POS.contentSize,'RubikMKT','700')});
  }
  // chapter — "Chapter N:" Regular + name Bold
  if(data.chapter){
    const m=String(data.chapter).match(/^(.*?:)\s*(.*)$/);
    const segs=m?[{text:m[1]+' ',family:'RubikMKT',weight:'400'},{text:m[2],family:'RubikMKT',weight:'700'}]
                :[{text:data.chapter,family:'RubikMKT',weight:'700'}];
    gradSegments(ctx,segs,W*POS.photoX,H*POS.chapterY,W*POS.chapterSize);
  }
  // date — RubikMKT Regular, solid navy, aligned above "CHỦ TỊCH" line
  if(data.date)gradText(ctx,data.date,W*POS.dateX,H*POS.dateY,W*POS.dateSize,'RubikMKT','400','#294998');
}
let CW=1333,CH=2000;
function canvasSize(){if(tplImg){CW=tplImg.naturalWidth||1333;CH=tplImg.naturalHeight||2000}}
async function ensureFonts(){
  try{await Promise.all([
    document.fonts.load('400 120px "MTD Brand Pro"'),

}
function redraw(){

}

/* ---------- photo helpers ---------- */
function fileToImage(file){
  return new Promise((res,rej)=>{
    if(!file||!file.type.startsWith('image/')){rej('Không phải ảnh');return}
    const fr=new FileReader();
    fr.onload=()=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>rej('Lỗi tải ảnh');im.src=fr.result};
    fr.onerror=()=>rej('Lỗi đọc file');fr.readAsDataURL(file);
  });
}

/* ---------- single download ---------- */
function sanitize(s){return String(s||'certificate').replace(/[^\p{L}\p{N} _-]/gu,'').trim().replace(/\s+/g,'_')||'certificate'}
function downloadCurrent(){
  const cv=document.createElement('canvas');cv.width=CW;cv.height=CH;
  drawCert(cv.getContext('2d'),CW,CH,state);
  cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=sanitize(state.name)+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000)},'image/png');
}

/* ---------- batch ---------- */
let batch=[];/* {photo:Image|null, name, content, chapter, date} */
function addRow(){batch.push({photo:null,name:'',content:state.content,chapter:state.chapter,date:state.date});renderBatch()}
function renderBatch(){
  const tb=$('#batchBody');if(!tb)return;
  tb.innerHTML=batch.map((r,i)=>`<tr>
    <td class="photo-cell">${r.photo?`<img src="${r.photo.src}" class="bphoto" data-i="${i}">`:`<div class="bphoto-empty" data-i="${i}">+</div>`}</td>

    <td><button class="row-del" data-del="${i}" title="Xóa dòng">✕</button></td>
  </tr>`).join('');
}
async function downloadBatch(){
  const valid=batch.filter(r=>r.name.trim());
  if(!valid.length){toast('Thêm ít nhất 1 dòng có tên.',true);return}
  const btn=$('#batchDl');btn.disabled=true;btn.textContent='Đang tạo...';
  try{
    const zip=new JSZip();const used={};
    for(const r of valid){
      const cv=document.createElement('canvas');cv.width=CW;cv.height=CH;
      drawCert(cv.getContext('2d'),CW,CH,r);
      const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
      let fn=sanitize(r.name);if(used[fn])fn+='_'+(++used[fn]);else used[fn]=1;
      zip.file(fn+'.png',blob);
    }
    const out=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');a.href=URL.createObjectURL(out);a.download='vinh-danh-content.zip';a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
    toast('Đã tạo '+valid.length+' chứng nhận!');
  }catch(e){toast('Lỗi: '+(e.message||e),true)}
  btn.disabled=false;btn.textContent='⬇ Tải tất cả (ZIP)';
}

        <div class="batch panel" id="batchPanel" style="display:none">
          <h3>📋 Tạo hàng loạt</h3>
          <p style="font-size:.82rem;color:var(--ink2);margin-bottom:14px">Mỗi dòng là 1 chứng nhận. Điền theo thứ tự: Ảnh, Tên, Nội dung, Chapter, Ngày.</p>
          <div style="overflow-x:auto">
            <table class="batch-tbl">
              <thead><tr><th>Ảnh</th><th>Tên</th><th>Nội dung vinh danh</th><th>Chapter</th><th>Ngày tháng năm</th><th></th></tr></thead>
              <tbody id="batchBody"></tbody>
            </table>
          </div>
          <input type="file" id="batchFile" accept="image/*" hidden>
          <div class="actions" style="justify-content:flex-start;margin-top:16px">
            <button class="btn btn-g btn-sm" id="addRow">+ Thêm dòng</button>
            <button class="btn btn-o" id="batchDl">⬇ Tải tất cả (ZIP)</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  bindTool();
  renderSliders();
  redraw();
}

function bindTool(){
  // text inputs
  $('#fName').oninput=e=>{state.name=e.target.value;redraw()};
  $('#fContent').oninput=e=>{state.content=e.target.value;redraw()};
  $('#fChapter').oninput=e=>{state.chapter=e.target.value;redraw()};
  $('#fDate').oninput=e=>{state.date=e.target.value;redraw()};

  // photo: click / file
  const drop=$('#drop'),fileIn=$('#fileIn');
  drop.onclick=()=>fileIn.click();
  fileIn.onchange=async e=>{if(e.target.files[0])await setPhoto(e.target.files[0])};
  // drag drop
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over')}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over')}));
  drop.addEventListener('drop',async e=>{const f=e.dataTransfer.files[0];if(f)await setPhoto(f)});
  // paste
  window.addEventListener('paste',async e=>{
    const it=[...(e.clipboardData?.items||[])].find(i=>i.type.startsWith('image/'));
    if(it){const f=it.getAsFile();if(f)await setPhoto(f)}
  });

  // template upload
  $('#tplIn').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{const img=await fileToImage(f);tplImg=img;canvasSize();
      const fr=new FileReader();fr.onload=()=>{try{localStorage.setItem(TPL_KEY,fr.result)}catch{}};fr.readAsDataURL(f);
      redraw();toast('Đã cập nhật template.');
    }catch(err){toast(err,true)}
  };

  // actions
  $('#dlOne').onclick=downloadCurrent;
  $('#toggleBatch').onclick=()=>{const p=$('#batchPanel');const show=p.style.display==='none';p.style.display=show?'block':'none';if(show&&!batch.length){addRow();addRow()}};
  $('#addRow').onclick=addRow;
  $('#batchDl').onclick=downloadBatch;
  $('#resetPos').onclick=()=>{POS={...DEFAULT_POS};savePos();renderSliders();redraw()};

  // batch table delegation
  $('#batchBody').addEventListener('input',e=>{
    const i=e.target.dataset.i,f=e.target.dataset.f;if(i!=null&&f){batch[i][f]=e.target.value}
  });
  let batchTarget=null;
  $('#batchBody').addEventListener('click',e=>{
    if(e.target.dataset.del!=null){batch.splice(+e.target.dataset.del,1);renderBatch();return}
    if(e.target.dataset.i!=null&&(e.target.classList.contains('bphoto')||e.target.classList.contains('bphoto-empty'))){
      batchTarget=+e.target.dataset.i;$('#batchFile').click();
    }
  });
  $('#batchFile').onchange=async e=>{
    const f=e.target.files[0];if(f!=null&&batchTarget!=null){try{batch[batchTarget].photo=await fileToImage(f);renderBatch()}catch(err){toast(err,true)}}
    e.target.value='';
  };
}

async function setPhoto(file){
  try{state.photo=await fileToImage(file);
    $('#dropPrev').innerHTML=`<img src="${state.photo.src}" alt="">`;
    redraw();
  }catch(err){toast(err,true)}
}

function renderSliders(){
  const box=$('#sliders');if(!box)return;
  box.innerHTML=SLIDERS.map(([k,label,mn,mx,st])=>`<div class="slider">
    <label><span>${label}</span><span id="v_${k}">${POS[k].toFixed(3)}</span></label>
    <input type="range" min="${mn}" max="${mx}" step="${st}" value="${POS[k]}" data-k="${k}">
  </div>`).join('');
  box.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.oninput=e=>{const k=e.target.dataset.k;POS[k]=parseFloat(e.target.value);$('#v_'+k).textContent=POS[k].toFixed(3);savePos();redraw()};
  });
}

/* ---------- access gate ---------- */
function renderDenied(msg){
  $('#app').innerHTML=`<div class="gate"><div class="gate-box">
    <div class="emo">🔒</div>
    <h2>Không có quyền truy cập</h2>
    <p>${esc(msg)}</p>
    <a href="/forum.html" class="btn btn-o">Về Forum</a>
  </div></div>`;
}

(async()=>{
  await ensureFonts();
  await loadTemplate();
  canvasSize();
  const {data:{user}}=await sb.auth.getUser();
  if(!user){renderDenied('Bạn cần đăng nhập bằng tài khoản Mod hoặc Admin trên Forum trước.');return}
  const {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(!prof||!['admin','moderator'].includes(prof.role)){
    renderDenied('Tool này chỉ dành cho thành viên có quyền Mod hoặc Admin. Liên hệ Admin để được cấp quyền.');return;
  }
  renderTool(prof);
})();
</script>
