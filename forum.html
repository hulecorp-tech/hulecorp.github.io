<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum — Huy Le Creative</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--c:#F4EBDC;--c2:#EAD9C4;--nv:#070F2B;--nv2:#0B2A78;--or:#FF7A1A;--or2:#FF9D4D;--cy:#41E2FF;--wh:#fff;--tx:#17130C;--tx2:#6B6050;--bd:#E2D8CC;--rad:18px;--sh:0 6px 28px rgba(0,0,0,.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--c);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none;cursor:pointer}
.disp{font-family:'Poppins',sans-serif}
.wrap{max-width:860px;margin:0 auto;padding:0 20px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(244,235,220,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:0}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.1rem;display:flex;align-items:center;gap:8px}
.nav-logo span{background:var(--nv);color:var(--c);width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:7px 14px;border-radius:20px;font-size:.82rem;font-weight:600;color:var(--tx2);transition:.2s}
.nav-links a:hover,.nav-links a.on{background:var(--nv);color:var(--wh)}
.nav-user{display:flex;align-items:center;gap:10px}
.avatar-sm{width:34px;height:34px;border-radius:50%;background:var(--nv2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;cursor:pointer;flex-shrink:0}
.btn{padding:9px 20px;border-radius:24px;font-weight:700;font-size:.82rem;cursor:pointer;border:0;font-family:'Inter',sans-serif;transition:.2s}
.btn-o{background:var(--or);color:#fff;box-shadow:0 6px 18px rgba(255,122,26,.35)}
.btn-o:hover{background:var(--or2);transform:translateY(-1px)}
.btn-g{background:transparent;border:2px solid var(--bd);color:var(--tx)}
.btn-g:hover{background:var(--c2)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn-danger{background:#EF4444;color:#fff}
.btn-danger:hover{background:#DC2626}

/* MAIN */
.view{padding:32px 0 80px}
.loading{text-align:center;padding:80px 20px;color:var(--tx2);font-size:1.1rem}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--nv);color:#fff;padding:14px 22px;border-radius:14px;font-weight:600;font-size:.9rem;transform:translateY(80px);opacity:0;transition:.35s;z-index:999;max-width:320px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:#EF4444}

/* SETUP SCREEN */
.setup-box{max-width:520px;margin:60px auto;background:var(--wh);border-radius:var(--rad);padding:40px;box-shadow:var(--sh)}
.setup-box h2{font-family:'Poppins',sans-serif;font-size:1.6rem;margin-bottom:8px}
.setup-box p{color:var(--tx2);margin-bottom:24px;line-height:1.6;font-size:.95rem}
.setup-box pre{background:var(--c2);border-radius:10px;padding:14px;font-size:.78rem;margin-bottom:20px;overflow-x:auto;color:var(--nv2);line-height:1.6}
details{margin-bottom:20px}
summary{cursor:pointer;font-weight:600;font-size:.9rem;color:var(--nv2);padding:8px 0}

/* FORMS */
.form-box{max-width:440px;margin:40px auto;background:var(--wh);border-radius:var(--rad);padding:36px;box-shadow:var(--sh)}
.form-box h2{font-family:'Poppins',sans-serif;font-size:1.5rem;margin-bottom:22px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-weight:600;font-size:.85rem;color:var(--tx2)}
.field input,.field textarea,.field select{border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:.93rem;font-family:'Inter',sans-serif;background:var(--c);color:var(--tx);transition:.2s}
.field input:focus,.field textarea:focus,.field select:focus{outline:0;border-color:var(--or);background:var(--wh)}
.field textarea{resize:vertical;min-height:100px}
.form-switch{text-align:center;margin-top:16px;color:var(--tx2);font-size:.88rem}
.form-switch a{color:var(--or);font-weight:700}

/* PAGE HEAD */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.ph h1{font-family:'Poppins',sans-serif;font-size:1.8rem;font-weight:800}
.bc{font-size:.85rem;color:var(--tx2);margin-bottom:16px}
.bc a{color:var(--or);font-weight:600}
.bc a:hover{text-decoration:underline}

/* CATEGORIES */
.cat-list{display:flex;flex-direction:column;gap:12px}
.cat-card{display:flex;align-items:center;gap:18px;background:var(--wh);border-radius:var(--rad);padding:20px 24px;box-shadow:var(--sh);transition:.25s}
.cat-card:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.13)}
.cat-icon{font-size:2.2rem;width:52px;text-align:center;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.08rem}
.cat-desc{color:var(--tx2);font-size:.88rem;margin-top:3px}
.cat-count{font-weight:700;color:var(--tx2);font-size:.88rem;flex-shrink:0}

/* POST LIST */
.post-list{display:flex;flex-direction:column;gap:10px}
.post-row{display:flex;align-items:center;gap:14px;background:var(--wh);border-radius:14px;padding:16px 20px;box-shadow:0 3px 14px rgba(0,0,0,.07);transition:.2s;border-left:4px solid transparent}
.post-row:hover{transform:translateX(3px);border-left-color:var(--or)}
.post-row.pinned{border-left-color:var(--nv2)}
.post-info{flex:1;min-width:0}
.post-title{font-weight:700;font-size:.97rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-meta{font-size:.8rem;color:var(--tx2);margin-top:3px}
.post-replies{text-align:right;font-size:.82rem;color:var(--tx2);font-weight:600;flex-shrink:0}
.post-replies span{display:block;font-weight:400}
.empty{text-align:center;padding:50px 20px;color:var(--tx2);background:var(--wh);border-radius:var(--rad)}
.pin,.lock{font-size:.9rem}

/* POST DETAIL */
.post-full{background:var(--wh);border-radius:var(--rad);padding:32px;box-shadow:var(--sh);margin-bottom:24px}
.post-full h1{font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:10px}
.post-byline{font-size:.85rem;color:var(--tx2);margin-bottom:22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.post-body{font-size:.97rem;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.locked-msg,.login-msg{text-align:center;padding:20px;color:var(--tx2);font-size:.9rem;background:var(--c2);border-radius:10px;margin-top:16px}

/* COMMENTS */
.comments-sec h3{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.15rem;margin-bottom:16px}
.comment-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.comment{display:flex;gap:12px;background:var(--wh);border-radius:14px;padding:16px;box-shadow:0 3px 12px rgba(0,0,0,.06)}
.c-avatar{width:38px;height:38px;border-radius:50%;background:var(--nv2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.c-body{flex:1;min-width:0}
.c-meta{font-size:.8rem;color:var(--tx2);margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.c-meta b{color:var(--tx)}
.c-text{font-size:.93rem;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.del-btn{font-size:.75rem;color:#EF4444;border:0;background:0;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif}
.del-btn:hover{text-decoration:underline}
.role-badge-sm{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.role-badge-sm.admin{background:var(--or);color:#fff}
.role-badge-sm.moderator{background:var(--nv2);color:#fff}

/* ADMIN */
.admin-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:2px solid var(--bd);padding-bottom:0}
.tab{padding:10px 20px;font-weight:700;font-size:.88rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;color:var(--tx2)}
.tab.on{color:var(--or);border-bottom-color:var(--or)}
.table-wrap{overflow-x:auto;background:var(--wh);border-radius:var(--rad);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--c2);padding:12px 16px;text-align:left;font-weight:700;color:var(--tx2)}
th:first-child{border-radius:var(--rad) 0 0 0}
th:last-child{border-radius:0 var(--rad) 0 0}
td{padding:11px 16px;border-top:1px solid var(--bd);vertical-align:middle}
tr:hover td{background:rgba(0,0,0,.02)}
.role-sel{border:1.5px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:.82rem;background:var(--c);font-family:'Inter',sans-serif;cursor:pointer}
.perm-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.perm-chip{display:flex;align-items:center;gap:6px;background:var(--nv);color:#fff;padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
.perm-chip button{background:0;border:0;color:rgba(255,255,255,.7);cursor:pointer;font-size:1rem;line-height:1;padding:0}
.perm-chip button:hover{color:#fff}
.perm-add{display:flex;gap:8px;flex-wrap:wrap}

/* PROFILE PAGE */
.profile-card{background:var(--wh);border-radius:var(--rad);padding:28px;box-shadow:var(--sh);margin-bottom:24px;display:flex;align-items:center;gap:20px}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:var(--nv2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.4rem;flex-shrink:0}
.profile-info h2{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.3rem}
.profile-info .meta{color:var(--tx2);font-size:.88rem;margin-top:4px;display:flex;gap:12px}
.role-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase}
.role-pill.admin{background:var(--or);color:#fff}
.role-pill.moderator{background:var(--nv2);color:#fff}
.role-pill.member{background:var(--c2);color:var(--tx2)}

@media(max-width:600px){
  .nav-links{display:none}
  .ph h1{font-size:1.4rem}
  .cat-card{padding:15px}
  .post-full{padding:20px}
  .form-box,.setup-box{margin:20px auto;padding:24px}
  .perm-add{flex-direction:column}
}
</style>
</head>
<body>
<nav class="nav" id="navEl"><div class="wrap nav-in" id="navIn"></div></nav>
<div id="toast" class="toast"></div>
<main class="view"><div class="wrap" id="view"><div class="loading">Đang tải...</div></div></main>

<script>
/* ====== CONFIG ====== */
const CFG_KEY = 'hf_sb_cfg';
let sb = null, me = null, prof = null;

function getCfg(){try{return JSON.parse(localStorage.getItem(CFG_KEY)||'null')}catch{return null}}
function saveCfg(u,k){localStorage.setItem(CFG_KEY,JSON.stringify({url:u,key:k}))}
function clearCfg(){localStorage.removeItem(CFG_KEY);location.reload()}

function initSb(url,key){
  sb = window.supabase.createClient(url,key);
}

/* ====== UTILS ====== */
const esc = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function ago(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return s+'s trước';if(s<3600)return Math.floor(s/60)+'ph trước';
  if(s<86400)return Math.floor(s/3600)+'h trước';return Math.floor(s/86400)+'ngày trước';
}
function view(html){document.getElementById('view').innerHTML=html}
let _tid;
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');
  clearTimeout(_tid);
  setTimeout(()=>t.classList.add('show'),10);
  _tid=setTimeout(()=>t.classList.remove('show'),3500);
}
function rolePill(r){return`<span class="role-pill ${r}">${r==='admin'?'Admin':r==='moderator'?'Mod':'Thành viên'}</span>`}
function roleBadgeSm(r){return r==='admin'?`<span class="role-badge-sm admin">ADMIN</span>`:r==='moderator'?`<span class="role-badge-sm moderator">MOD</span>`:``}

/* ====== NAV ====== */
function renderNav(){
  const h=location.hash.slice(1)||'home';
  const on=r=>h===r?'on':'';
  document.getElementById('navIn').innerHTML=`
    <a href="#home" class="nav-logo"><span>H</span> Forum</a>
    <div class="nav-links">
      <a href="#home" class="${on('home')}">Diễn đàn</a>
      ${prof?.role==='admin'?`<a href="#admin" class="${on('admin')}">Quản trị</a>`:''}
      ${me?`<a href="#profile" class="${on('profile')}">Hồ sơ</a>`:''}
    </div>
    <div class="nav-user">
      ${me
        ? `<div class="avatar-sm" onclick="goto('profile')">${(prof?.username||me.email||'?')[0].toUpperCase()}</div>
           <button class="btn btn-g btn-sm" onclick="doLogout()">Đăng xuất</button>`
        : `<button class="btn btn-o btn-sm" onclick="goto('login')">Đăng nhập</button>`
      }
      <button class="btn btn-g btn-sm" onclick="clearCfg()" title="Đổi cấu hình">⚙️</button>
    </div>`;
}

/* ====== ROUTER ====== */
function goto(r){location.hash=r}
async function router(){
  const h=location.hash.slice(1)||'home';
  renderNav();
  if(h==='home') await renderHome();
  else if(h==='login') renderLogin();
  else if(h==='register') renderRegister();
  else if(h.startsWith('cat-')) await renderCategory(h.slice(4));
  else if(h.startsWith('post-')) await renderPost(h.slice(5));
  else if(h==='new-post') await renderNewPost(null);
  else if(h.startsWith('new-post-')) await renderNewPost(h.slice(9));
  else if(h==='admin') await renderAdmin();
  else if(h==='profile') await renderProfile();
  else await renderHome();
}
window.addEventListener('hashchange',router);

/* ====== AUTH ====== */
async function loadUser(){
  const {data:{user}}=await sb.auth.getUser();
  me=user||null;
  if(me){
    const {data}=await sb.from('profiles').select('*').eq('id',me.id).single();
    prof=data;
  } else prof=null;
}

function renderLogin(){
  view(`<div class="form-box">
    <h2 class="disp">Đăng nhập</h2>
    <form id="loginForm">
      <div class="field"><label>Email</label><input name="email" type="email" required placeholder="you@email.com"></div>
      <div class="field"><label>Mật khẩu</label><input name="pw" type="password" required minlength="6" placeholder="••••••••"></div>
      <button class="btn btn-o" style="width:100%" type="submit">Đăng nhập</button>
    </form>
    <div class="form-switch">Chưa có tài khoản? <a href="#register">Đăng ký ngay</a></div>
  </div>`);
  document.getElementById('loginForm').onsubmit=async e=>{
    e.preventDefault();
    const f=e.target;const btn=f.querySelector('button');btn.disabled=true;btn.textContent='Đang đăng nhập...';
    try{
      const {error}=await sb.auth.signInWithPassword({email:f.email.value.trim(),password:f.pw.value});
      if(error)throw error;
      await loadUser();renderNav();toast('Đăng nhập thành công!');goto('home');
    }catch(err){toast(err.message||'Đăng nhập thất bại',true);btn.disabled=false;btn.textContent='Đăng nhập'}
  };
}

function renderRegister(){
  view(`<div class="form-box">
    <h2 class="disp">Đăng ký</h2>
    <form id="regForm">
      <div class="field"><label>Tên hiển thị</label><input name="uname" required minlength="3" maxlength="30" placeholder="Tên của bạn"></div>
      <div class="field"><label>Email</label><input name="email" type="email" required placeholder="you@email.com"></div>
      <div class="field"><label>Mật khẩu</label><input name="pw" type="password" required minlength="6" placeholder="Ít nhất 6 ký tự"></div>
      <button class="btn btn-o" style="width:100%" type="submit">Đăng ký</button>
    </form>
    <div class="form-switch">Đã có tài khoản? <a href="#login">Đăng nhập</a></div>
  </div>`);
  document.getElementById('regForm').onsubmit=async e=>{
    e.preventDefault();
    const f=e.target;const btn=f.querySelector('button');btn.disabled=true;btn.textContent='Đang đăng ký...';
    const uname=f.uname.value.trim();
    try{
      const {data,error}=await sb.auth.signUp({email:f.email.value.trim(),password:f.pw.value});
      if(error)throw error;
      if(data.user){
        await sb.from('profiles').upsert({id:data.user.id,username:uname});
        await loadUser();renderNav();toast('Đăng ký thành công! Chào mừng '+uname);goto('home');
      } else {
        toast('Kiểm tra email để xác nhận tài khoản.');goto('login');
      }
    }catch(err){toast(err.message||'Đăng ký thất bại',true);btn.disabled=false;btn.textContent='Đăng ký'}
  };
}

async function doLogout(){
  await sb.auth.signOut();me=null;prof=null;renderNav();toast('Đã đăng xuất.');goto('home');
}

/* ====== VIEWS ====== */
async function renderHome(){
  view('<div class="loading">Đang tải...</div>');
  const [{data:cats},{data:posts}]=await Promise.all([
    sb.from('categories').select('*').order('id'),
    sb.from('posts').select('id,category_id').order('created_at',{ascending:false})
  ]);
  const cnt={};(posts||[]).forEach(p=>{cnt[p.category_id]=(cnt[p.category_id]||0)+1});
  view(`
    <div class="ph">
      <h1 class="disp">💬 Diễn đàn</h1>
      ${me?`<a href="#new-post" class="btn btn-o">+ Bài mới</a>`:`<button class="btn btn-o" onclick="goto('login')">Đăng nhập để đăng bài</button>`}
    </div>
    <div class="cat-list">
      ${(cats||[]).map(c=>`
        <a href="#cat-${c.id}" class="cat-card">
          <div class="cat-icon">${esc(c.icon)}</div>
          <div class="cat-info">
            <div class="cat-name">${esc(c.name)}</div>
            <div class="cat-desc">${esc(c.description||'')}</div>
          </div>
          <div class="cat-count">${cnt[c.id]||0} bài</div>
        </a>`).join('')}
    </div>`);
}

async function renderCategory(id){
  view('<div class="loading">Đang tải...</div>');
  const [{data:cat},{data:posts}]=await Promise.all([
    sb.from('categories').select('*').eq('id',id).single(),
    sb.from('posts').select('id,title,is_pinned,is_locked,reply_count,created_at,profiles!author_id(username,role)')
      .eq('category_id',id).order('is_pinned',{ascending:false}).order('created_at',{ascending:false}).limit(50)
  ]);
  view(`
    <div class="bc"><a href="#home">Forum</a> / ${esc(cat?.name)}</div>
    <div class="ph">
      <h1 class="disp">${esc(cat?.icon)} ${esc(cat?.name)}</h1>
      ${me?`<a href="#new-post-${id}" class="btn btn-o btn-sm">+ Bài mới</a>`:''}
    </div>
    <div class="post-list">
      ${(posts||[]).length?posts.map(p=>`
        <a href="#post-${p.id}" class="post-row ${p.is_pinned?'pinned':''}">
          <div class="post-info">
            <div class="post-title">${p.is_pinned?'📌 ':''}${p.is_locked?'🔒 ':''}${esc(p.title)}</div>
            <div class="post-meta">bởi <b>${esc(p.profiles?.username)}</b> · ${ago(p.created_at)}</div>
          </div>
          <div class="post-replies">${p.reply_count||0}<span>replies</span></div>
        </a>`).join('')
        :`<div class="empty">Chưa có bài viết nào trong danh mục này.<br><small>Hãy là người đầu tiên đăng bài!</small></div>`}
    </div>`);
}

async function renderPost(id){
  view('<div class="loading">Đang tải...</div>');
  const [{data:post},{data:cmts}]=await Promise.all([
    sb.from('posts').select('*,profiles!author_id(id,username,role),categories(id,name)').eq('id',id).single(),
    sb.from('comments').select('*,profiles!author_id(id,username,role)').eq('post_id',id).order('created_at')
  ]);
  if(!post){view('<div class="empty">Bài viết không tồn tại.</div>');return}
  const canMod=prof?.role==='admin'||prof?.role==='moderator';
  view(`
    <div class="bc"><a href="#home">Forum</a> / <a href="#cat-${post.categories?.id}">${esc(post.categories?.name)}</a></div>
    <div class="post-full">
      <h1>${esc(post.title)}</h1>
      <div class="post-byline">
        <div class="avatar-sm" style="width:28px;height:28px;font-size:.75rem">${(post.profiles?.username||'?')[0].toUpperCase()}</div>
        <b>${esc(post.profiles?.username)}</b>${roleBadgeSm(post.profiles?.role)}
        <span>·</span><span>${ago(post.created_at)}</span>
        ${canMod?`<button class="btn btn-sm" style="margin-left:auto" onclick="togglePin(${post.id},${post.is_pinned})">${post.is_pinned?'Bỏ ghim':'Ghim'}</button>
          <button class="btn btn-sm" onclick="toggleLock(${post.id},${post.is_locked})">${post.is_locked?'Mở khóa':'Khóa'}</button>
          <button class="btn btn-sm btn-danger" onclick="delPost(${post.id})">Xóa</button>`:
          (me?.id===post.profiles?.id?`<button class="btn btn-sm btn-danger" style="margin-left:auto" onclick="delPost(${post.id})">Xóa bài</button>`:'')}
      </div>
      <div class="post-body">${esc(post.content)}</div>
    </div>
    <div class="comments-sec">
      <h3>${cmts?.length||0} Phản hồi</h3>
      <div class="comment-list" id="cmtList">
        ${(cmts||[]).map(c=>`
          <div class="comment" id="c${c.id}">
            <div class="c-avatar">${(c.profiles?.username||'?')[0].toUpperCase()}</div>
            <div class="c-body">
              <div class="c-meta"><b>${esc(c.profiles?.username)}</b>${roleBadgeSm(c.profiles?.role)} · ${ago(c.created_at)}</div>
              <div class="c-text">${esc(c.content)}</div>
              ${(canMod||c.profiles?.id===me?.id)?`<button class="del-btn" onclick="delCmt(${c.id},${id})">Xóa</button>`:``}
            </div>
          </div>`).join('')}
      </div>
      ${me&&!post.is_locked?`
        <form id="cmtForm">
          <div class="field"><label>Phản hồi của bạn</label>
            <textarea name="content" placeholder="Viết phản hồi..." required rows="4"></textarea></div>
          <button class="btn btn-o" type="submit">Gửi phản hồi</button>
        </form>`:
        post.is_locked?`<div class="locked-msg">🔒 Bài viết đã bị khóa, không thể phản hồi.</div>`:
        `<div class="login-msg"><a href="#login" style="color:var(--or);font-weight:700">Đăng nhập</a> để phản hồi.</div>`}
    </div>`);

  document.getElementById('cmtForm')?.addEventListener('submit',async e=>{
    e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;
    const {error}=await sb.from('comments').insert({content:e.target.content.value.trim(),author_id:me.id,post_id:Number(id)});
    if(!error){
      await sb.from('posts').update({reply_count:(post.reply_count||0)+(cmts?.length||0)+1}).eq('id',id);
      toast('Phản hồi đã gửi!');renderPost(id);
    } else {toast(error.message,true);btn.disabled=false;}
  });
}

window.togglePin=async(id,cur)=>{await sb.from('posts').update({is_pinned:!cur}).eq('id',id);renderPost(id);}
window.toggleLock=async(id,cur)=>{await sb.from('posts').update({is_locked:!cur}).eq('id',id);renderPost(id);}
window.delPost=async id=>{
  if(!confirm('Xóa bài viết này?'))return;
  await sb.from('comments').delete().eq('post_id',id);
  await sb.from('posts').delete().eq('id',id);
  toast('Đã xóa bài viết.');goto('home');
}
window.delCmt=async(id,pid)=>{
  if(!confirm('Xóa phản hồi này?'))return;
  await sb.from('comments').delete().eq('id',id);
  toast('Đã xóa phản hồi.');renderPost(pid);
}

async function renderNewPost(catId){

  const {data:cats}=await sb.from('categories').select('id,name').order('id');
  view(`

      <h2 class="disp">Đăng bài mới</h2>
      <form id="postForm">
        <div class="field"><label>Tiêu đề</label><input name="title" required maxlength="120" placeholder="Tiêu đề bài viết..."></div>
        <div class="field"><label>Danh mục</label>
          <select name="cat" required>
            <option value="">-- Chọn danh mục --</option>
            ${(cats||[]).map(c=>`<option value="${c.id}" ${catId==c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
          </select></div>
        <div class="field"><label>Nội dung</label><textarea name="content" required rows="8" placeholder="Nội dung bài viết..."></textarea></div>

          <button class="btn btn-g" type="button" onclick="history.back()">Hủy</button>
        </div>
      </form>
    </div>`);
  document.getElementById('postForm').onsubmit=async e=>{
    e.preventDefault();const f=e.target;const btn=f.querySelector('[type=submit]');btn.disabled=true;
    const {data,error}=await sb.from('posts').insert({
      title:f.title.value.trim(),content:f.content.value.trim(),

}

/* ====== SETUP SCREEN ====== */
function renderSetup(){
  document.getElementById('view').innerHTML=`<div class="setup-box">
    <h2 class="disp">🔧 Cài đặt Supabase</h2>
    <p>Để chạy forum, bạn cần tài khoản <b>Supabase</b> miễn phí và tạo project mới.<br>Sau đó điền thông tin bên dưới.</p>
    <details><summary>📋 SQL Schema — chạy trong Supabase SQL Editor</summary>
    <pre>-- Chạy từng khối trong Supabase > SQL Editor
create table profiles (
  id uuid references auth.users on delete cascade primary key,
  username text unique not null default 'user',
  role text not null default 'member',
  created_at timestamptz default now()
);

create or replace function handle_new_user()
returns trigger as $$ begin
  insert into profiles(id,username)
  values(new.id, split_part(new.email,'@',1));
  return new;
end; $$ language plpgsql security definer;

create trigger on_auth_user_created
  after insert on auth.users
  for each row execute procedure handle_new_user();

create table categories (
  id serial primary key, name text not null,
  description text, slug text unique not null,
  icon text default '💬', created_at timestamptz default now()
);
create table posts (
  id serial primary key, title text not null, content text not null,
  author_id uuid references profiles(id) on delete cascade,
  category_id integer references categories(id) on delete set null,
  is_pinned boolean default false, is_locked boolean default false,
  reply_count integer default 0, created_at timestamptz default now()
);
create table comments (
  id serial primary key, content text not null,
  author_id uuid references profiles(id) on delete cascade,
  post_id integer references posts(id) on delete cascade,
  created_at timestamptz default now()
);
create table user_permissions (
  id serial primary key,
  user_id uuid references profiles(id) on delete cascade,
  permission text not null, granted_by uuid references profiles(id),
  created_at timestamptz default now(), unique(user_id,permission)
);

-- RLS
alter table profiles enable row level security;
alter table categories enable row level security;
alter table posts enable row level security;
alter table comments enable row level security;
alter table user_permissions enable row level security;

create policy "p_read" on profiles for select using(true);
create policy "p_upd" on profiles for update using(auth.uid()=id or exists(select 1 from profiles where id=auth.uid() and role='admin'));
create policy "c_read" on categories for select using(true);
create policy "c_all" on categories for all using(exists(select 1 from profiles where id=auth.uid() and role='admin'));
create policy "po_read" on posts for select using(true);
create policy "po_ins" on posts for insert with check(auth.uid()=author_id);
create policy "po_upd" on posts for update using(auth.uid()=author_id or exists(select 1 from profiles where id=auth.uid() and role in('admin','moderator')));
create policy "po_del" on posts for delete using(auth.uid()=author_id or exists(select 1 from profiles where id=auth.uid() and role in('admin','moderator')));
create policy "cm_read" on comments for select using(true);
create policy "cm_ins" on comments for insert with check(auth.uid()=author_id);
create policy "cm_del" on comments for delete using(auth.uid()=author_id or exists(select 1 from profiles where id=auth.uid() and role in('admin','moderator')));
create policy "pm_sel" on user_permissions for select using(auth.uid()=user_id or exists(select 1 from profiles where id=auth.uid() and role='admin'));
create policy "pm_all" on user_permissions for all using(exists(select 1 from profiles where id=auth.uid() and role='admin'));

-- Danh mục mẫu
insert into categories(name,description,slug,icon) values
  ('Thông báo','Thông báo từ Admin','thong-bao','📢'),
  ('Thảo luận chung','Nói chuyện gì cũng được','chung','💬'),
  ('Góp ý & Phản hồi','Ý kiến về forum và tool','gop-y','💡');

-- Sau khi đăng ký xong, set admin:
-- update profiles set role='admin' where id=(select id from auth.users where email='your@email.com');</pre>
    </details>
    <form id="setupForm">
      <div class="field"><label>Supabase Project URL</label><input name="url" type="url" required placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Supabase Anon Key</label><input name="key" required placeholder="eyJhbGci..."></div>
      <button class="btn btn-o" type="submit" style="width:100%">Kết nối Supabase</button>
    </form>
  </div>`;
  document.getElementById('setupForm').onsubmit=async e=>{
    e.preventDefault();const f=e.target;
    const url=f.url.value.trim();const key=f.key.value.trim();
    try{
      initSb(url,key);
      const {error}=await sb.from('categories').select('id').limit(1);
      if(error)throw new Error('Kết nối thất bại: '+error.message);
      saveCfg(url,key);toast('Kết nối thành công!');location.reload();
    }catch(err){toast(err.message,true)}
  };
}

(async()=>{
  const cfg=getCfg();
  if(!cfg){renderSetup();document.getElementById('navIn').innerHTML='<a href="#" class="nav-logo"><span>H</span> Forum</a>';return}
