<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum — Huy Le</title>

<style>
:root{--bg:#F4EBDC;--bg2:#EAD9C4;--nv:#070F2B;--nv2:#0B2A78;--or:#FF7A1A;--or2:#FF9D4D;--wh:#fff;--tx:#17130C;--tx2:#6B6050;--bd:#E2D8CC;--rad:16px;--sh:0 4px 20px rgba(0,0,0,.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
a{color:inherit;text-decoration:none;cursor:pointer}
button{cursor:pointer;font-family:inherit}
.pp{font-family:'Poppins',sans-serif;font-weight:700}
.wrap{max-width:860px;margin:0 auto;padding:0 20px}

.nav{position:sticky;top:0;z-index:100;background:rgba(244,235,220,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:58px;gap:12px}
.logo{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px}
.logo-i{width:30px;height:30px;background:var(--nv);color:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-links{display:flex;gap:2px}
.nav-links a{padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:600;color:var(--tx2);transition:.15s}
.nav-links a:hover,.nav-links a.on{background:var(--nv);color:#fff}
.nav-r{display:flex;align-items:center;gap:8px}
.av{width:32px;height:32px;border-radius:50%;background:var(--nv2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;cursor:pointer;flex-shrink:0}

.btn{padding:8px 18px;border-radius:24px;font-weight:700;font-size:.82rem;border:none;transition:.15s;font-family:inherit;cursor:pointer}
.btn-o{background:var(--or);color:#fff}.btn-o:hover{background:var(--or2)}
.btn-g{background:var(--bg2);color:var(--tx)}.btn-g:hover{background:var(--bd)}
.btn-nv{background:var(--nv);color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn:disabled{opacity:.5;pointer-events:none}

.view{min-height:calc(100vh - 58px);padding:32px 0 60px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--nv);color:#fff;padding:12px 20px;border-radius:12px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}.toast.err{background:#ef4444}

.spin{text-align:center;padding:60px 20px;color:var(--tx2);font-size:.9rem}
.spin::before{content:'⟳';display:block;font-size:2rem;margin-bottom:12px;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--tx2);font-size:.9rem;line-height:1.7}

.ph{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.ph h1{font-family:'Poppins',sans-serif;font-size:1.6rem}
.card{background:var(--wh);border-radius:var(--rad);border:1px solid var(--bd);padding:20px;box-shadow:var(--sh)}

.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-card{display:flex;align-items:center;gap:16px;background:var(--wh);border:1px solid var(--bd);border-radius:var(--rad);padding:18px 20px;box-shadow:var(--sh);transition:.15s}
.cat-card:hover{border-color:var(--or);transform:translateY(-1px)}
.cat-icon{font-size:1.8rem;flex-shrink:0;width:44px;text-align:center}
.cat-info{flex:1;min-width:0}
.cat-name{font-weight:700;font-size:1rem;margin-bottom:3px}
.cat-desc{color:var(--tx2);font-size:.84rem}
.cat-count{color:var(--tx2);font-size:.82rem;white-space:nowrap}

.post-list{display:flex;flex-direction:column;gap:8px}
.post-row{display:flex;align-items:center;gap:16px;background:var(--wh);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;transition:.15s}
.post-row:hover{border-color:var(--or)}
.post-row.pinned{background:rgba(255,122,26,.05);border-color:rgba(255,122,26,.3)}
.post-info{flex:1;min-width:0}
.post-title{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.post-meta{color:var(--tx2);font-size:.78rem}
.post-replies{text-align:center;min-width:50px;color:var(--tx2);font-size:.82rem;font-weight:600}
.post-replies span{display:block;font-size:.72rem;font-weight:400}

.post-full{background:var(--wh);border-radius:var(--rad);border:1px solid var(--bd);padding:28px;margin-bottom:24px;box-shadow:var(--sh)}
.post-full h1{font-family:'Poppins',sans-serif;font-size:1.4rem;margin-bottom:14px}
.post-byline{display:flex;align-items:center;gap:8px;color:var(--tx2);font-size:.82rem;margin-bottom:20px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.post-body{line-height:1.75;white-space:pre-wrap;word-break:break-word}

.cmts-sec h3{font-size:1rem;margin-bottom:14px;font-weight:700}
.comment{display:flex;gap:12px;margin-bottom:16px}
.c-av{width:32px;height:32px;border-radius:50%;background:var(--nv2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0}
.c-body{flex:1;background:var(--wh);border:1px solid var(--bd);border-radius:12px;padding:12px 16px}
.c-meta{color:var(--tx2);font-size:.78rem;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.c-text{font-size:.88rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.del-btn{font-size:.72rem;color:#ef4444;background:none;border:none;padding:4px 0;margin-top:4px;cursor:pointer;font-family:inherit}
.locked-msg,.login-cta{text-align:center;padding:20px;color:var(--tx2);font-size:.88rem;background:var(--bg2);border-radius:12px;margin-top:16px}

.bc{font-size:.82rem;color:var(--tx2);margin-bottom:16px}
.bc a{color:var(--or);font-weight:600}

.form-box{max-width:440px;margin:0 auto}
.form-box h2{font-family:'Poppins',sans-serif;margin-bottom:24px}
.wide-form{max-width:600px;margin:0 auto}
.wide-form h2{font-family:'Poppins',sans-serif;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.82rem;font-weight:600;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:10px;font-family:inherit;font-size:.9rem;background:var(--wh);color:var(--tx);outline:none;transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--or)}
.field textarea{resize:vertical;min-height:120px}
.form-footer{margin-top:12px;color:var(--tx2);font-size:.82rem;text-align:center}
.form-footer a{color:var(--or);font-weight:600}

.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase}
.bdg-a{background:var(--or);color:#fff}.bdg-m{background:var(--nv2);color:#fff}.bdg-u{background:var(--bg2);color:var(--tx2)}

.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:12px;padding:4px}
.tab{flex:1;padding:8px;border-radius:9px;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;color:var(--tx2);transition:.15s;border:none;background:none;font-family:inherit}
.tab.on{background:var(--wh);color:var(--nv);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;padding:10px 12px;color:var(--tx2);font-weight:600;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
select.rsel{padding:4px 8px;border-radius:8px;border:1.5px solid var(--bd);font-family:inherit;font-size:.8rem;background:var(--wh)}

.setup-box{max-width:560px;margin:0 auto;background:var(--wh);border-radius:var(--rad);border:1px solid var(--bd);padding:32px;box-shadow:var(--sh)}
.setup-box h2{font-family:'Poppins',sans-serif;margin-bottom:12px}
.sql-pre{background:var(--nv);color:#e2e8f0;padding:16px;border-radius:10px;font-size:.7rem;font-family:monospace;overflow:auto;max-height:260px;white-space:pre;margin:10px 0;line-height:1.6}
details summary{cursor:pointer;font-size:.82rem;font-weight:600;color:var(--or);padding:8px 0;user-select:none}

.perm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);gap:12px;font-size:.85rem}
.perm-add{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.perm-add input,.perm-add select{flex:1;padding:8px 12px;border:1.5px solid var(--bd);border-radius:8px;font-family:inherit;font-size:.82rem;background:var(--wh);min-width:100px}

.profile-hdr{display:flex;align-items:center;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.av-lg{width:64px;height:64px;border-radius:50%;background:var(--nv2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.6rem}

.err-box{background:var(--wh);border-radius:var(--rad);border:2px solid #ef4444;padding:32px;text-align:center;max-width:480px;margin:0 auto}

@media(max-width:600px){
  .nav-links{display:none}
  .ph h1{font-size:1.2rem}
  .post-full{padding:18px}
  .setup-box{margin:16px auto;padding:24px}
}
</style>
</head>

    </div>`;
}

/* ROUTER */
async function router(){
  const h=location.hash.slice(1)||'home';
  renderNav();
  if(h==='home') await renderHome();
  else if(h==='login') renderLogin();
  else if(h==='register') renderRegister();
  else if(h==='forgot') renderForgot();
  else if(h==='reset') renderReset();
  else if(h.startsWith('cat-')) await renderCat(h.slice(4));
  else if(h.startsWith('post-')) await renderPost(h.slice(5));
  else if(h==='new-post') await renderNewPost(null);
  else if(h.startsWith('new-post-')) await renderNewPost(h.slice(9));
  else if(h==='admin') await renderAdmin();

}

/* POST */
async function renderPost(id){
  view('<div class="spin"></div>');
  try{
    const[r1,r2]=await Promise.all([
      sb.from('posts').select('*,profiles!author_id(id,username,role),categories(id,name)').eq('id',id).single(),
      sb.from('comments').select('*,profiles!author_id(id,username,role)').eq('post_id',id).order('created_at')
    ]);
    if(r1.error)throw r1.error;
    const post=r1.data,cmts=r2.data||[];
    const isMod=prof?.role==='admin'||prof?.role==='moderator';
    const isOwn=me?.id===post.profiles?.id;
    view(`<div class="bc"><a href="#home">Forum</a> › <a href="#cat-${post.categories?.id}">${esc(post.categories?.name)}</a></div>
      <div class="post-full">
        <h1>${esc(post.title)}</h1>
        <div class="post-byline">
          <div class="av" style="width:26px;height:26px;font-size:.7rem">${(post.profiles?.username||'?')[0].toUpperCase()}</div>
          <b>${esc(post.profiles?.username)}</b>${bdg(post.profiles?.role)}<span>·</span><span>${ago(post.created_at)}</span>
          ${isMod?`<span style="margin-left:auto;display:flex;gap:6px">
            <button class="btn btn-g btn-sm" onclick="modPost(${post.id},'pin',${post.is_pinned})">${post.is_pinned?'Bỏ ghim':'Ghim'}</button>
            <button class="btn btn-g btn-sm" onclick="modPost(${post.id},'lock',${post.is_locked})">${post.is_locked?'Mở khóa':'Khóa'}</button>
            <button class="btn btn-red btn-sm" onclick="delPost(${post.id})">Xóa</button></span>`
          :isOwn?`<button class="btn btn-red btn-sm" style="margin-left:auto" onclick="delPost(${post.id})">Xóa bài</button>`:''}
        </div>
        <div class="post-body">${esc(post.content)}</div>
      </div>
      <div class="cmts-sec">
        <h3>${cmts.length} Phản hồi</h3>
        <div id="clist">${cmts.map(c=>`<div class="comment" id="c${c.id}"><div class="c-av">${(c.profiles?.username||'?')[0].toUpperCase()}</div><div class="c-body"><div class="c-meta"><b>${esc(c.profiles?.username)}</b>${bdg(c.profiles?.role)}<span>${ago(c.created_at)}</span></div><div class="c-text">${esc(c.content)}</div>${(isMod||c.profiles?.id===me?.id)?`<button class="del-btn" onclick="delCmt(${c.id},${id})">Xóa</button>`:''}</div></div>`).join('')}</div>
        ${me&&!post.is_locked?`<form id="cf" style="margin-top:16px"><div class="field"><label>Phản hồi của bạn</label><textarea name="content" rows="4" placeholder="Viết phản hồi..." required></textarea></div><button class="btn btn-o" type="submit">Gửi phản hồi</button></form>`
        :post.is_locked?`<div class="locked-msg">🔒 Bài viết đã bị khóa.</div>`
        :`<div class="login-cta"><a href="#login" style="color:var(--or);font-weight:700">Đăng nhập</a> để phản hồi.</div>`}
      </div>`);
    document.getElementById('cf')?.addEventListener('submit',async e=>{
      e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;
      const{error}=await sb.from('comments').insert({content:e.target.content.value.trim(),author_id:me.id,post_id:Number(id)});
      if(!error){await sb.from('posts').update({reply_count:cmts.length+1}).eq('id',id);toast('Phản hồi đã gửi!');renderPost(id);}
      else{toast(error.message,true);btn.disabled=false;}
    });
  }catch(err){view(errBox(err.message||String(err)));}
}

window.modPost=async(id,act,cur)=>{
  const f=act==='pin'?'is_pinned':'is_locked';
  await sb.from('posts').update({[f]:!cur}).eq('id',id);renderPost(id);
};
window.delPost=async id=>{
  if(!confirm('Xóa bài viết này?'))return;
  const{data:p}=await sb.from('posts').select('category_id').eq('id',id).single();
  await sb.from('comments').delete().eq('post_id',id);
  await sb.from('posts').delete().eq('id',id);
  toast('Đã xóa.');goto(p?.category_id?'cat-'+p.category_id:'home');
};
window.delCmt=async(id,pid)=>{
  if(!confirm('Xóa phản hồi?'))return;
  await sb.from('comments').delete().eq('id',id);
  toast('Đã xóa.');renderPost(pid);
};

/* ADMIN */
let atab='users';
async function renderAdmin(){
  if(prof?.role!=='admin'){view('<div class="empty">⛔ Bạn không có quyền truy cập.</div>');return}
  if(atab==='users') await renderAUsers();
  else if(atab==='perms') await renderAPerms();
  else if(atab==='cats') await renderACats();
  else if(atab==='vouchers') await renderAVouchers();
}
window.renderAdmin=renderAdmin;

function adminTabs(cur){
  return`<div class="ph"><h1 class="pp">⚙️ Quản trị</h1></div>
    <div class="tabs">
      <button class="tab${cur==='users'?' on':''}" onclick="atab='users';renderAdmin()">Người dùng</button>
      <button class="tab${cur==='perms'?' on':''}" onclick="atab='perms';renderAdmin()">Quyền Tool</button>
      <button class="tab${cur==='cats'?' on':''}" onclick="atab='cats';renderAdmin()">Danh mục</button>
      <button class="tab${cur==='vouchers'?' on':''}" onclick="atab='vouchers';renderAdmin()">🛒 Voucher</button>
    </div>`;
}

async function renderAUsers(){

  atab='perms';view('<div class="spin"></div>');
  const[{data:users},{data:perms}]=await Promise.all([
    sb.from('profiles').select('id,username').order('username'),
    sb.from('user_permissions').select('*,profiles!user_id(username)').order('created_at',{ascending:false})
  ]);
  view(`${adminTabs('perms')}<div class="card" style="margin-bottom:20px">
    <b style="font-size:.85rem">Cấp quyền mới</b>
    <div class="perm-add">
      <select id="pusr"><option value="">-- Người dùng --</option>${(users||[]).map(u=>`<option value="${u.id}">${esc(u.username)}</option>`).join('')}</select>
      <input id="pinp" placeholder="vd: tool.designTool.edit" style="flex:2">
      <button class="btn btn-o btn-sm" onclick="grantPerm()">Cấp quyền</button>
    </div>
  </div>
  <div class="card">
    <b style="font-size:.85rem">Quyền đang hoạt động</b>
    ${(perms||[]).length?perms.map(p=>`<div class="perm-row"><span><b>${esc(p.profiles?.username)}</b> — <code style="font-size:.8rem">${esc(p.permission)}</code></span><button class="btn btn-red btn-sm" onclick="revokePerm(${p.id})">Thu hồi</button></div>`).join(''):`<div class="empty" style="padding:20px 0">Chưa có quyền nào.</div>`}
  </div>`);
}
window.grantPerm=async()=>{
  const uid=document.getElementById('pusr').value,perm=document.getElementById('pinp').value.trim();
  if(!uid||!perm){toast('Chọn người dùng và nhập quyền.',true);return}
  const{error}=await sb.from('user_permissions').insert({user_id:uid,permission:perm,granted_by:me.id});
  if(error)toast(error.message,true);else{toast('Đã cấp quyền!');renderAPerms();}
};
window.revokePerm=async id=>{
  if(!confirm('Thu hồi quyền này?'))return;
  await sb.from('user_permissions').delete().eq('id',id);
  toast('Đã thu hồi.');renderAPerms();
};

async function renderACats(){
  atab='cats';view('<div class="spin"></div>');
  const{data:cats}=await sb.from('categories').select('*').order('id');
  view(`${adminTabs('cats')}<div class="card" style="margin-bottom:20px">
    <b style="font-size:.85rem;display:block;margin-bottom:12px">Thêm danh mục mới</b>
    <form id="catf" style="display:flex;gap:8px;flex-wrap:wrap">
      <input name="icon" placeholder="🗂️" style="width:60px;padding:8px;border:1.5px solid var(--bd);border-radius:8px;font-size:1.1rem;text-align:center">
      <input name="cname" placeholder="Tên danh mục" required style="flex:2;padding:8px 12px;border:1.5px solid var(--bd);border-radius:8px;font-family:inherit;font-size:.88rem;min-width:100px">
      <input name="cdesc" placeholder="Mô tả (tùy chọn)" style="flex:3;padding:8px 12px;border:1.5px solid var(--bd);border-radius:8px;font-family:inherit;font-size:.88rem;min-width:100px">
      <button class="btn btn-o btn-sm" type="submit">Thêm</button>
    </form>
  </div>
  <div class="cat-list">${(cats||[]).map(c=>`<div class="cat-card" style="cursor:default">
    <div class="cat-icon">${esc(c.icon||'💬')}</div>
    <div class="cat-info"><div class="cat-name">${esc(c.name)}</div><div class="cat-desc">${esc(c.description||'')}</div></div>
    <button class="btn btn-red btn-sm" onclick="delCat(${c.id})">Xóa</button>
  </div>`).join('')||`<div class="empty">Chưa có danh mục nào.</div>`}</div>`);
  document.getElementById('catf').onsubmit=async e=>{
    e.preventDefault();const btn=e.target.querySelector('[type=submit]');btn.disabled=true;
    const{error}=await sb.from('categories').insert({name:e.target.cname.value.trim(),description:e.target.cdesc.value.trim()||null,icon:e.target.icon.value.trim()||'💬'});
    if(error)toast(error.message,true);else{toast('Đã thêm danh mục!');renderACats();}
  };
}
window.delCat=async id=>{
  if(!confirm('Xóa danh mục?'))return;
  await sb.from('categories').delete().eq('id',id);
  toast('Đã xóa.');renderACats();
};

/* VOUCHERS */
async function renderAVouchers(){
  atab='vouchers';view('<div class="spin"></div>');
  const{data:vs,error}=await sb.from('shopee_vouchers').select('*').order('sort_order').order('id');
  if(error&&(error.code==='42P01'||error.message?.includes('does not exist'))){
    view(`${adminTabs('vouchers')}<div class="card">
      <b style="font-size:.88rem;display:block;margin-bottom:10px">⚠️ Chưa tạo bảng shopee_vouchers</b>
      <p style="font-size:.8rem;color:var(--tx2);margin-bottom:10px">Chạy SQL sau trong <b>Supabase → SQL Editor</b>:</p>
      <pre class="sql-pre">CREATE TABLE IF NOT EXISTS shopee_vouchers (
  id SERIAL PRIMARY KEY,
  code TEXT NOT NULL,
  label TEXT NOT NULL,
  description TEXT,
  max_uses INT DEFAULT 100,
  used_count INT DEFAULT 0,
  active BOOLEAN DEFAULT true,
  sort_order INT DEFAULT 0,
  expires_at TIMESTAMPTZ,
  created_at TIMESTAMPTZ DEFAULT now()
);
ALTER TABLE shopee_vouchers ENABLE ROW LEVEL SECURITY;
CREATE POLICY "pub_read" ON shopee_vouchers FOR SELECT TO anon USING (active=true);
CREATE POLICY "auth_all" ON shopee_vouchers FOR ALL TO authenticated USING (true);</pre>
      <button class="btn btn-g btn-sm" onclick="renderAVouchers()" style="margin-top:8px">↺ Thử lại sau khi chạy SQL</button>
    </div>`);
    return;
  }
  const vouchers=vs||[];
  const now=new Date();
  view(`${adminTabs('vouchers')}
  <div class="card" style="margin-bottom:16px">
    <b style="font-size:.85rem;display:block;margin-bottom:14px">➕ Thêm mã giảm giá</b>
    <form id="vf" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div style="display:flex;flex-direction:column;gap:4px;min-width:110px;flex:1">
        <label style="font-size:.72rem;font-weight:700">Mã voucher *</label>
        <input name="vcode" required placeholder="VD: GIAM25" style="padding:9px 11px;border:1.5px solid var(--bd);border-radius:9px;font-family:inherit;font-size:.88rem;text-transform:uppercase;letter-spacing:.5px">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;min-width:120px;flex:1">
        <label style="font-size:.72rem;font-weight:700">Nhãn hiển thị *</label>
        <input name="vlabel" required placeholder="VD: Giảm 25%" style="padding:9px 11px;border:1.5px solid var(--bd);border-radius:9px;font-family:inherit;font-size:.88rem">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;min-width:160px;flex:2">
        <label style="font-size:.72rem;font-weight:700">Mô tả</label>
        <input name="vdesc" placeholder="VD: Đơn 500K giảm 50K" style="padding:9px 11px;border:1.5px solid var(--bd);border-radius:9px;font-family:inherit;font-size:.88rem">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;width:90px;flex-shrink:0">
        <label style="font-size:.72rem;font-weight:700">Tổng lượt</label>
        <input name="vmax" type="number" value="100" min="1" style="padding:9px 11px;border:1.5px solid var(--bd);border-radius:9px;font-family:inherit;font-size:.88rem">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <label style="font-size:.72rem;font-weight:700">Hết hạn</label>
        <input name="vexp" type="date" style="padding:9px 11px;border:1.5px solid var(--bd);border-radius:9px;font-family:inherit;font-size:.85rem">
      </div>
      <button class="btn btn-o" type="submit" style="padding:9px 20px;height:40px;align-self:flex-end">Thêm</button>
    </form>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <b style="font-size:.85rem">Danh sách mã (${vouchers.length})</b>
      <a href="/shopee" target="_blank" class="btn btn-g btn-sm" style="font-size:.75rem">🔗 Xem trang Shopee</a>
    </div>
    ${vouchers.length?`<div class="table-wrap"><table>
      <thead><tr><th>Mã</th><th>Nhãn / Mô tả</th><th>Lượt dùng</th><th>Còn lại</th><th>Hết hạn</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
      <tbody>${vouchers.map(v=>{
        const used=v.used_count||0,max=v.max_uses||100;
        const pct=Math.min(100,Math.round(used/max*100));
        const left=max-used;
        const expired=v.expires_at&&new Date(v.expires_at)<now;
        const barColor=pct>=90?'#ef4444':pct>=60?'#f59e0b':'#22c55e';
        return`<tr style="${!v.active||expired?'opacity:.55':''}">
          <td><code style="font-weight:700;color:#EE4D2D;font-size:.85rem;letter-spacing:.3px">${esc(v.code)}</code></td>
          <td>
            <div style="font-weight:600;font-size:.85rem">${esc(v.label)}</div>
            ${v.description?`<div style="color:var(--tx2);font-size:.75rem;margin-top:2px">${esc(v.description)}</div>`:''}
          </td>
          <td>
            <div style="font-size:.82rem;font-weight:600;margin-bottom:4px">${used} / ${max}</div>
            <div style="width:72px;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px;transition:.3s"></div>
            </div>
          </td>
          <td style="font-size:.82rem;font-weight:700;color:${left<=0?'#ef4444':'#22c55e'}">${left<=0?'Hết lượt':left+' lượt'}</td>
          <td style="font-size:.76rem;color:${expired?'#ef4444':'var(--tx2)'}">${v.expires_at?new Date(v.expires_at).toLocaleDateString('vi')+(expired?' ⚠️':''):'—'}</td>
          <td>
            <select class="rsel" onchange="vToggle(${v.id},this.value)">
              <option value="1"${v.active?' selected':''}>✅ Bật</option>
              <option value="0"${!v.active?' selected':''}>⏸ Tắt</option>
            </select>
          </td>
          <td style="white-space:nowrap">
            <input type="number" value="${max}" min="1" title="Tổng lượt tối đa"
              style="width:62px;padding:4px 6px;border:1.5px solid var(--bd);border-radius:7px;font-size:.78rem;font-family:inherit;margin-right:4px"
              onblur="vSetMax(${v.id},this.value,${used})">
            <button class="btn btn-g btn-sm" onclick="vReset(${v.id})" title="Reset về 0 lượt đã dùng" style="margin-right:4px">↺</button>
            <button class="btn btn-red btn-sm" onclick="vDel(${v.id})">Xóa</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`:`<div class="empty" style="padding:24px 0">Chưa có mã nào. Thêm mã ở trên.</div>`}
  </div>`);

  document.getElementById('vf').onsubmit=async e=>{
    e.preventDefault();const btn=e.target.querySelector('[type=submit]');btn.disabled=true;btn.textContent='Đang thêm...';
    const code=e.target.vcode.value.trim().toUpperCase();
    const label=e.target.vlabel.value.trim();
    const desc=e.target.vdesc.value.trim()||null;
    const max=parseInt(e.target.vmax.value)||100;
    const exp=e.target.vexp.value||null;
    const payload={code,label,description:desc,max_uses:max};
    if(exp)payload.expires_at=new Date(exp).toISOString();
    const{error}=await sb.from('shopee_vouchers').insert(payload);
    if(error){toast(error.message,true);btn.disabled=false;btn.textContent='Thêm';}
    else{toast('✅ Đã thêm mã '+code+'!');renderAVouchers();}
  };
}
window.vToggle=async(id,val)=>{
  await sb.from('shopee_vouchers').update({active:val==='1'}).eq('id',id);
  toast(val==='1'?'Đã bật mã!':'Đã tắt mã!');renderAVouchers();
};
window.vSetMax=async(id,val,used)=>{
  const n=parseInt(val);if(isNaN(n)||n<1)return;
  await sb.from('shopee_vouchers').update({max_uses:n}).eq('id',id);
  toast('Đã cập nhật tổng lượt!');
};
window.vReset=async id=>{
  if(!confirm('Reset số lượt đã dùng về 0?'))return;
  await sb.from('shopee_vouchers').update({used_count:0}).eq('id',id);
  toast('Đã reset!');renderAVouchers();
};
window.vDel=async id=>{
  if(!confirm('Xóa mã voucher này?'))return;
  await sb.from('shopee_vouchers').delete().eq('id',id);
  toast('Đã xóa.');renderAVouchers();
};

/* INIT */
(async()=>{
  const isRecovery=location.hash.includes('type=recovery');
  initSb(SB_URL,SB_KEY);
  try{
    await loadUser();
    renderNav();
    if(isRecovery){renderReset();}
    else{await router();}
  }catch(err){
    renderNav();
    view(errBox(err.message||String(err)));
  }
  sb.auth.onAuthStateChange(async(event,session)=>{
    try{
      me=session?.user||null;
      if(me){const{data}=await sb.from('profiles').select('*').eq('id',me.id).single();prof=data||null;}
      else prof=null;
      renderNav();
      if(event==='PASSWORD_RECOVERY'){goto('reset');}
    }catch(e){console.error('auth change',e);}
  });
})();
</script>
</body>
</html>
