/* downscale an image file/URL to a size-friendly data URL */
function fileToDataURL(file,max=1400,quality=.85){
  return new Promise((res,rej)=>{
    const img=new Image();img.onload=()=>{
      let{width:w,height:h}=img;const sc=Math.min(1,max/Math.max(w,h));
      const c=document.createElement('canvas');c.width=Math.round(w*sc);c.height=Math.round(h*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',quality));
    };img.onerror=()=>rej(new Error('Không đọc được ảnh'));
    const fr=new FileReader();fr.onload=()=>img.src=fr.result;fr.onerror=()=>rej(new Error('Không đọc được file'));fr.readAsDataURL(file);
  });
}

  if(!r.ok&&!data.error)data.error='Lỗi máy chủ ('+r.status+')';
  return data;
}

      aiOut.innerHTML=`<img src="${aiImage}" alt="AI">`;aiActions.style.display='flex';

      // remember prompt on the order — fire-and-forget, must never clobber the shown image

    finally{$('#genBtn').disabled=false}
  };
  // AI result is a same-origin data URL → editable without CORS taint
  $('#toEdit').onclick=()=>{if(aiImage)loadEditor(aiImage,false)};

  $('#upload').onclick=()=>$('#upFile').click();

  $('#flv').onclick=()=>{if(!ED)return;ED.flipV=!ED.flipV;drawEditor()};
  $('#reset').onclick=()=>{if(!ED)return;ED.rot=0;ED.flipH=ED.flipV=false;ED.texts=[];['brightness','contrast','saturate'].forEach(k=>{$('#'+k).value=100;$('#'+k+'V').textContent='100'});$('#grayscale').value=0;$('#grayscaleV').textContent='0';renderTextList();drawEditor()};
  ['brightness','contrast','saturate','grayscale'].forEach(k=>{const el=$('#'+k);if(el)el.oninput=()=>{$('#'+k+'V').textContent=el.value;drawEditor()}});
  $('#addText').onclick=()=>{if(!ED)return;ED.texts.push({text:'Nội dung',x:ED.w/2,y:ED.h/2,size:Math.round(ED.h*.08),color:'#ffffff'});renderTextList();drawEditor()};
  $('#dl').onclick=()=>{if(!ED)return;const url=exportCanvas();if(!url)return;const a=document.createElement('a');a.href=url;a.download=slug(o.title)+'.png';a.click()};
  $('#deliver').onclick=async()=>{
    if(!ED)return;const url=exportCanvas(1600,'image/jpeg',.9);if(!url)return;
    $('#deliver').disabled=true;
    const {error}=await sb.from('design_orders').update({result_image:url,status:'done',designer_id:me.id,designer_name:prof?.username||me.email}).eq('id',o.id);
    if(error){$('#deliver').disabled=false;return toast(error.message,true);}
    // best-effort: append to the version history (needs the `deliveries` jsonb column; ignored if absent)
    try{
      const cur=Array.isArray(o.deliveries)?o.deliveries:[];
      const next=[...cur,{image:url,at:new Date().toISOString(),by:prof?.username||me.email}];
      const r=await sb.from('design_orders').update({deliveries:next}).eq('id',o.id);
      if(!r.error)o.deliveries=next;
    }catch(_){}
    $('#deliver').disabled=false;
    o.result_image=url;o.status='done';toast('Đã giao thiết kế! Đã lưu vào Lịch sử. ✅');
  };
}

/* ---------- canvas editor engine ---------- */
function loadEditor(src,isCross){
  const img=new Image();if(isCross)img.crossOrigin='anonymous';
  img.onload=()=>{
    ED={img,rot:0,flipH:false,flipV:false,texts:[],w:img.naturalWidth,h:img.naturalHeight,tainted:false};
    const stage=$('#stage');stage.innerHTML='<canvas id="editCanvas"></canvas>';
    $('#editCtrls').style.display='block';
    ['brightness','contrast','saturate'].forEach(k=>{$('#'+k).value=100;$('#'+k+'V').textContent='100'});
    $('#grayscale').value=0;$('#grayscaleV').textContent='0';
    renderTextList();bindCanvasDrag();drawEditor();
  };
  img.onerror=()=>toast('Không tải được ảnh (có thể do CORS). Hãy tải ảnh về rồi tải lên lại.',true);
  img.src=src;
}
function orientedSize(){const swap=ED.rot%180!==0;return{w:swap?ED.h:ED.w,h:swap?ED.w:ED.h}}
function filterStr(){return `brightness(${$('#brightness').value}%) contrast(${$('#contrast').value}%) saturate(${$('#saturate').value}%) grayscale(${$('#grayscale').value}%)`}
function drawBase(ctx,W,H){
  ctx.save();ctx.filter=filterStr();ctx.translate(W/2,H/2);ctx.rotate(ED.rot*Math.PI/180);
  ctx.scale(ED.flipH?-1:1,ED.flipV?-1:1);ctx.drawImage(ED.img,-ED.w/2,-ED.h/2);ctx.restore();
}
function drawTexts(ctx){ED.texts.forEach(t=>{ctx.save();ctx.font=`800 ${t.size}px 'Be Vietnam Pro', sans-serif`;ctx.fillStyle=t.color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineWidth=Math.max(2,t.size*.06);ctx.strokeStyle='rgba(0,0,0,.35)';ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);ctx.restore()})}
function drawEditor(){
  if(!ED)return;const{w:W,h:H}=orientedSize();const c=$('#editCanvas');if(!c)return;
  c.width=W;c.height=H;
  // fit display within stage width
  const maxW=Math.min(($('#stage').clientWidth||600)-24,760);const scale=Math.min(1,maxW/W);
  c.style.width=(W*scale)+'px';c.style.height='auto';c.dataset.scale=scale;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,W,H);drawBase(ctx,W,H);drawTexts(ctx);
}
function exportCanvas(max=0,type='image/png',q=.92){
  if(!ED)return null;const{w:W,h:H}=orientedSize();
  const c=document.createElement('canvas');let ow=W,oh=H;
  if(max&&Math.max(W,H)>max){const s=max/Math.max(W,H);ow=Math.round(W*s);oh=Math.round(H*s)}
  c.width=ow;c.height=oh;const ctx=c.getContext('2d');const sx=ow/W;ctx.scale(sx,sx);
  drawBase(ctx,W,H);drawTexts(ctx);
  try{return c.toDataURL(type,q)}catch(e){toast('Ảnh bị khoá CORS, không xuất được. Tải ảnh về từ khung AI rồi tải lên lại để chỉnh.',true);return null}
}
function renderTextList(){
  const box=$('#texts');if(!box)return;
  box.innerHTML=ED.texts.map((t,i)=>`<div class="txt-item">
    <input type="text" value="${esc(t.text)}" data-i="${i}" data-f="text">
    <input type="number" value="${t.size}" min="8" data-i="${i}" data-f="size" title="Cỡ chữ">
    <input type="color" value="${t.color}" data-i="${i}" data-f="color">
    <button class="btn btn-g btn-sm" data-del="${i}">✕</button>
  </div>`).join('');
  box.querySelectorAll('input').forEach(el=>el.oninput=()=>{const i=+el.dataset.i,f=el.dataset.f;ED.texts[i][f]=f==='size'?+el.value:el.value;drawEditor()});
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ED.texts.splice(+b.dataset.del,1);renderTextList();drawEditor()});
}
function bindCanvasDrag(){
  const c=$('#editCanvas');if(!c)return;let drag=null;
  const pt=ev=>{const r=c.getBoundingClientRect();const scale=(c.width/r.width);return{x:(ev.clientX-r.left)*scale,y:(ev.clientY-r.top)*scale}};
  c.onpointerdown=ev=>{const p=pt(ev);for(let i=ED.texts.length-1;i>=0;i--){const t=ED.texts[i];const half=t.size;if(Math.abs(p.x-t.x)<t.text.length*t.size*.35+20&&Math.abs(p.y-t.y)<half){drag={i,dx:p.x-t.x,dy:p.y-t.y};c.setPointerCapture(ev.pointerId);c.style.cursor='grabbing';return}}};
  c.onpointermove=ev=>{if(!drag)return;const p=pt(ev);ED.texts[drag.i].x=p.x-drag.dx;ED.texts[drag.i].y=p.y-drag.dy;drawEditor()};
  c.onpointerup=()=>{drag=null;c.style.cursor='default'};
}
window.addEventListener('resize',()=>{if(ED)drawEditor()});
</script>
