<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Mẫu Giấy In — Huy Le Creative</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--cream:#F5EFE6;--card:#fff;--ink:#2D2A24;--ink2:#5F5646;--bd:#E5DDCE;--ac:#2563EB;--ac2:#3B82F6;--rad:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Urbanist',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
.mono{font-family:'Space Mono',monospace}
a{color:inherit;text-decoration:none}
button,select,input{font-family:inherit}
.top{background:var(--card);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.top .back{font-size:.85rem;color:var(--ink2);transition:.15s}
.top .back:hover{color:var(--ink)}
.top h1{font-size:1.05rem;font-weight:900;letter-spacing:-.3px}
.layout{display:grid;grid-template-columns:340px 1fr;gap:0;height:calc(100vh - 53px)}
/* CONTROL PANEL */
.panel{background:var(--card);border-right:1px solid var(--bd);overflow-y:auto;padding:20px}
.grp{margin-bottom:22px}
.grp>label{display:block;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2);margin-bottom:10px}
select,input[type=number]{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:.9rem;background:#fff;color:var(--ink);outline:none;transition:.15s}
select:focus,input:focus{border-color:var(--ac)}
.types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.type-btn{padding:10px 4px;border:1.5px solid var(--bd);border-radius:10px;background:#fff;cursor:pointer;font-size:.72rem;font-weight:700;text-align:center;color:var(--ink2);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:5px}
.type-btn .ic{font-size:1.3rem}
.type-btn:hover{border-color:var(--ac);color:var(--ink)}
.type-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.field label{display:block;font-size:.72rem;color:var(--ink2);font-weight:600;margin-bottom:5px}
.swatches{display:flex;flex-wrap:wrap;gap:8px}
.sw{width:30px;height:30px;border-radius:8px;border:2px solid var(--bd);cursor:pointer;transition:.15s}
.sw.on{border-color:var(--ink);transform:scale(1.08)}
.chk{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:6px}
.chk input{width:auto}
.range-val{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--ink2);float:right}
input[type=range]{width:100%;accent-color:var(--ac)}
input[type=color]{width:100%;height:38px;border:1.5px solid var(--bd);border-radius:10px;background:#fff;cursor:pointer;padding:3px}
.exports{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px}
.ex{padding:12px 4px;border:none;border-radius:10px;font-weight:800;font-size:.82rem;cursor:pointer;color:#fff;transition:.15s}
.ex.pdf{background:#DC2626}.ex.png{background:var(--ac)}.ex.svg{background:#7C3AED}
.ex:hover{filter:brightness(1.08)}
/* PREVIEW */
.preview{display:flex;align-items:center;justify-content:center;padding:30px;overflow:auto;background:repeating-conic-gradient(#eee 0% 25%,#f7f7f7 0% 50%) 50%/22px 22px}
.preview svg{box-shadow:0 8px 40px rgba(0,0,0,.18);max-width:100%;max-height:calc(100vh - 120px);height:auto;background:#fff}
@media(max-width:820px){
  .layout{grid-template-columns:1fr;height:auto}
  .panel{border-right:none;border-bottom:1px solid var(--bd);max-height:none}
  .preview{min-height:60vh}
}
</style>
</head>
<body>
<div class="top">
  <a href="/forum.html#tools" class="back">← Công cụ</a>
  <h1>📄 Tạo Mẫu Giấy In</h1>
</div>

<div class="layout">
  <!-- CONTROLS -->
  <div class="panel">
    <div class="grp">
      <label>Loại giấy</label>
      <div class="types" id="types"></div>
    </div>

    <div class="grp">
      <label>Khổ giấy & hướng</label>
      <div class="row">
        <select id="size">
          <option value="A4">A4 (210×297)</option>
          <option value="A3">A3 (297×420)</option>
          <option value="A5">A5 (148×210)</option>
          <option value="Letter">Letter (216×279)</option>
          <option value="Legal">Legal (216×356)</option>
        </select>
        <select id="orient">
          <option value="portrait">Dọc</option>
          <option value="landscape">Ngang</option>
        </select>
      </div>
    </div>

    <div class="grp">
      <label>Giao diện (Theme)</label>
      <div class="swatches" id="themes"></div>
    </div>

    <div class="grp">
      <label>Khoảng cách dòng/ô <span class="range-val" id="spacingVal">8 mm</span></label>
      <input type="range" id="spacing" min="3" max="20" step="0.5" value="8">
    </div>

    <div class="grp">
      <label>Lề <span class="range-val" id="marginVal">12 mm</span></label>
      <input type="range" id="margin" min="0" max="30" step="1" value="12">
    </div>

    <div class="grp">
      <label>Độ đậm nét <span class="range-val" id="lwVal">0.25 mm</span></label>
      <input type="range" id="lw" min="0.1" max="1" step="0.05" value="0.25">
    </div>

    <div class="grp">
      <label>Màu nét vẽ</label>
      <input type="color" id="lineColor" value="#9DB4D0">
      <label class="chk"><input type="checkbox" id="marginLine"> Kẻ lề đỏ (giấy ô ly)</label>
    </div>

    <div class="grp">
      <label>Xuất file</label>
      <div class="exports">
        <button class="ex pdf" id="btnPdf">PDF</button>
        <button class="ex png" id="btnPng">PNG</button>
        <button class="ex svg" id="btnSvg">SVG</button>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview" id="preview"></div>
</div>

<script>
/* ---------------- DATA ---------------- */
const SIZES={A4:[210,297],A3:[297,420],A5:[148,210],Letter:[216,279],Legal:[216,356]};
const TYPES=[
  {id:'lined',   ic:'📝', name:'Kẻ ngang'},
  {id:'grid',    ic:'▦',  name:'Ô vuông'},
  {id:'dots',    ic:'⠿',  name:'Chấm bi'},
  {id:'graph',   ic:'📐', name:'Kẻ ô kỹ thuật'},
  {id:'cornell', ic:'🗒️', name:'Cornell'},
  {id:'music',   ic:'🎼', name:'Khuông nhạc'},
  {id:'hand',    ic:'✍️', name:'Tập viết 4 ô'},
  {id:'iso',     ic:'◳',  name:'Isometric'},
  {id:'blank',   ic:'⬜', name:'Trắng'},
];
const THEMES=[
  {id:'white',   bg:'#FFFFFF', line:'#9DB4D0', label:'Trắng'},
  {id:'sepia',   bg:'#F4ECD8', line:'#C8B48A', label:'Sepia'},
  {id:'vintage', bg:'#EFE6D0', line:'#B8A07A', label:'Cổ điển'},
  {id:'pastel',  bg:'#FEF6FB', line:'#F0B6D2', label:'Pastel'},
  {id:'mint',    bg:'#EFFAF4', line:'#9AD9BE', label:'Mint'},
  {id:'night',   bg:'#1A1A22', line:'#454560', label:'Tối'},
];

/* ---------------- STATE ---------------- */
const state={type:'lined',size:'A4',orient:'portrait',theme:'white',
  spacing:8,margin:12,lw:0.25,lineColor:'#9DB4D0',marginLine:false};

/* ---------------- UI BUILD ---------------- */
const typesEl=document.getElementById('types');
TYPES.forEach(t=>{
  const b=document.createElement('button');
  b.className='type-btn'+(t.id===state.type?' on':'');
  b.innerHTML=`<span class="ic">${t.ic}</span>${t.name}`;
  b.onclick=()=>{state.type=t.id;document.querySelectorAll('.type-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  typesEl.appendChild(b);
});
const themesEl=document.getElementById('themes');
THEMES.forEach(th=>{
  const s=document.createElement('div');
  s.className='sw'+(th.id===state.theme?' on':'');
  s.style.background=th.bg;s.title=th.label;
  s.onclick=()=>{
    state.theme=th.id;state.lineColor=th.line;
    document.getElementById('lineColor').value=th.line;
    document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));s.classList.add('on');
    render();
  };
  themesEl.appendChild(s);
});

const bind=(id,key,fmt)=>{
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{
    state[key]=el.type==='checkbox'?el.checked:(el.type==='range'||el.type==='number'?parseFloat(el.value):el.value);
    if(fmt)document.getElementById(fmt.el).textContent=fmt.f(state[key]);
    render();
  });
};
bind('size','size');bind('orient','orient');
bind('spacing','spacing',{el:'spacingVal',f:v=>v+' mm'});
bind('margin','margin',{el:'marginVal',f:v=>v+' mm'});
bind('lw','lw',{el:'lwVal',f:v=>v+' mm'});
bind('lineColor','lineColor');bind('marginLine','marginLine');

/* ---------------- SVG GENERATORS ---------------- */
function dims(){
  let [w,h]=SIZES[state.size];
  if(state.orient==='landscape')[w,h]=[h,w];
  return [w,h];
}
function bgColor(){return THEMES.find(t=>t.id===state.theme).bg;}

function buildInner(){
  const [w,h]=dims();
  const m=state.margin, sp=state.spacing, lw=state.lw, c=state.lineColor;
  const L=[];
  const hline=(y,col=c,wd=lw,dash='')=>L.push(`<line x1="${m}" y1="${y.toFixed(2)}" x2="${(w-m).toFixed(2)}" y2="${y.toFixed(2)}" stroke="${col}" stroke-width="${wd}"${dash?` stroke-dasharray="${dash}"`:''}/>`);
  const vline=(x,col=c,wd=lw,dash='')=>L.push(`<line x1="${x.toFixed(2)}" y1="${m}" x2="${x.toFixed(2)}" y2="${(h-m).toFixed(2)}" stroke="${col}" stroke-width="${wd}"${dash?` stroke-dasharray="${dash}"`:''}/>`);

  if(state.type==='lined'){
    for(let y=m+sp;y<=h-m;y+=sp)hline(y);
    if(state.marginLine)L.push(`<line x1="${m+18}" y1="${m}" x2="${m+18}" y2="${h-m}" stroke="#E57373" stroke-width="${lw}"/>`);
  }
  else if(state.type==='grid'){
    for(let y=m;y<=h-m+0.01;y+=sp)hline(y);
    for(let x=m;x<=w-m+0.01;x+=sp)vline(x);
  }
  else if(state.type==='dots'){
    for(let y=m;y<=h-m+0.01;y+=sp)for(let x=m;x<=w-m+0.01;x+=sp)
      L.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${(lw*1.6).toFixed(2)}" fill="${c}"/>`);
  }
  else if(state.type==='graph'){
    const minor=sp/5;
    const faint=hexFade(c,.45);
    for(let y=m;y<=h-m+0.01;y+=minor)hline(y,faint,lw*0.6);
    for(let x=m;x<=w-m+0.01;x+=minor)vline(x,faint,lw*0.6);
    for(let y=m;y<=h-m+0.01;y+=sp)hline(y,c,lw);
    for(let x=m;x<=w-m+0.01;x+=sp)vline(x,c,lw);
  }
  else if(state.type==='cornell'){
    const noteTop=m+22; // header area
    const summaryY=h-m-0.18*(h-2*m);
    const cueX=m+0.3*(w-2*m);
    L.push(`<line x1="${m}" y1="${noteTop}" x2="${w-m}" y2="${noteTop}" stroke="${c}" stroke-width="${lw*1.4}"/>`);
    L.push(`<line x1="${cueX.toFixed(2)}" y1="${noteTop}" x2="${cueX.toFixed(2)}" y2="${summaryY.toFixed(2)}" stroke="${c}" stroke-width="${lw*1.4}"/>`);
    L.push(`<line x1="${m}" y1="${summaryY.toFixed(2)}" x2="${w-m}" y2="${summaryY.toFixed(2)}" stroke="${c}" stroke-width="${lw*1.4}"/>`);
    for(let y=noteTop+sp;y<summaryY-0.5;y+=sp)
      L.push(`<line x1="${cueX.toFixed(2)}" y1="${y.toFixed(2)}" x2="${w-m}" y2="${y.toFixed(2)}" stroke="${hexFade(c,.6)}" stroke-width="${lw}"/>`);
  }
  else if(state.type==='music'){
    const g=sp/2;            // gap between staff lines
    const staff=g*4;         // height of one 5-line staff
    let y=m+staff;
    while(y<=h-m){
      for(let i=0;i<5;i++)hline(y-staff+i*g,c,lw);
      y+=staff+sp*1.3;       // gap between staves
    }
  }
  else if(state.type==='hand'){
    // 4-line penmanship: top(faint) - mid(dashed) - baseline(bold) - descender(faint)
    let base=m+sp;
    while(base<=h-m){
      hline(base-sp, hexFade(c,.5), lw);          // top
      hline(base-sp/2, c, lw, `${(lw*4).toFixed(2)},${(lw*4).toFixed(2)}`); // mid dashed
      hline(base, c, lw*1.5);                      // baseline
      hline(base+sp/2, hexFade(c,.5), lw);         // descender
      base+=sp*1.8;
    }
  }
  else if(state.type==='iso'){
    const faint=c;
    const tan30=Math.tan(Math.PI/6);
    // verticals
    for(let x=m;x<=w-m+0.01;x+=sp)vline(x,faint,lw);
    // diagonals +30 and -30 across the page
    const x0=m,x1=w-m,y0=m,y1=h-m;
    const step=sp;
    // lines going down-right (slope +tan30): y = tan30*(x-bx)+y0 ... iterate intercepts
    for(let b=-(h);b<=(w+h);b+=step){
      // +30°
      L.push(diagClip(x0,x1,y0,y1, tan30, b, faint, lw));
      // -30°
      L.push(diagClip(x0,x1,y0,y1,-tan30, b, faint, lw));
    }
  }
  // blank => nothing
  return L.join('');
}
// draw a clipped diagonal line y = slope*x + c, clamped to box; returns line or ''
function diagClip(x0,x1,y0,y1,slope,c,col,lw){
  let pts=[];
  const add=(x,y)=>{if(x>=x0-0.01&&x<=x1+0.01&&y>=y0-0.01&&y<=y1+0.01)pts.push([x,y]);};
  // intersect with left/right edges
  add(x0,slope*x0+c);add(x1,slope*x1+c);
  // intersect with top/bottom edges
  if(slope!==0){add((y0-c)/slope,y0);add((y1-c)/slope,y1);}
  if(pts.length<2)return '';
  // pick two extreme points
  pts.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  const p=pts[0],q=pts[pts.length-1];
  if(Math.abs(p[0]-q[0])<0.01&&Math.abs(p[1]-q[1])<0.01)return '';
  return `<line x1="${p[0].toFixed(2)}" y1="${p[1].toFixed(2)}" x2="${q[0].toFixed(2)}" y2="${q[1].toFixed(2)}" stroke="${col}" stroke-width="${lw}"/>`;
}
function hexFade(hex,a){
  const h=hex.replace('#','');
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${a})`;
}

function svgString(forScreen){
  const [w,h]=dims();
  const inner=buildInner();
  const sizeAttr=forScreen?`viewBox="0 0 ${w} ${h}"`:`width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}"`;
  return `<svg xmlns="http://www.w3.org/2000/svg" ${sizeAttr}><rect x="0" y="0" width="${w}" height="${h}" fill="${bgColor()}"/>${inner}</svg>`;
}

function render(){document.getElementById('preview').innerHTML=svgString(true);}

/* ---------------- EXPORT ---------------- */
function download(blob,name){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
async function renderCanvas(dpi){
  const [w,h]=dims();
  const scale=dpi/25.4;
  const W=Math.round(w*scale),H=Math.round(h*scale);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="${bgColor()}"/>${buildInner()}</svg>`;
  const img=new Image();
  const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});
  const c=document.createElement('canvas');c.width=W;c.height=H;
  c.getContext('2d').drawImage(img,0,0,W,H);
  URL.revokeObjectURL(url);
  return {canvas:c,w,h};
}
document.getElementById('btnSvg').onclick=()=>download(new Blob([svgString(false)],{type:'image/svg+xml'}),`giay-${state.type}.svg`);
document.getElementById('btnPng').onclick=async()=>{
  const {canvas}=await renderCanvas(300);
  canvas.toBlob(b=>download(b,`giay-${state.type}.png`),'image/png');
};
document.getElementById('btnPdf').onclick=async()=>{
  const {canvas,w,h}=await renderCanvas(300);
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({unit:'mm',format:[w,h],orientation:w>h?'landscape':'portrait'});
  pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);
  pdf.save(`giay-${state.type}.pdf`);
};

render();
</script>
</body>
</html>
